<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#f4f1ea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="读心助手" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>读心助手 · 聊天分析与应对</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --card: #fffdf8;
        --ink: #2b2b2b;
        --muted: #8a8275;
        --accent: #c8643c;
        --accent-soft: #f0d9cd;
        --line: #e7e0d3;
        --good: #4a8c5a;
        --warn: #c89a3c;
        --hot: #c8643c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.6;
      }
      .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }
      header h1 { font-size: 22px; margin: 4px 0; }
      header p { color: var(--muted); margin: 0 0 14px; font-size: 14px; }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 16px;
      }
      label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 8px; }
      .scenes, .modes { display: flex; gap: 8px; flex-wrap: wrap; }
      .scene, .mode {
        flex: 1; min-width: 90px; text-align: center; padding: 10px 8px;
        border: 1px solid var(--line); border-radius: 12px; background: #fff;
        font-size: 14px; cursor: pointer; user-select: none;
      }
      .scene.active, .mode.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 600; }
      .modes { margin-bottom: 16px; }
      .uploader {
        border: 2px dashed var(--line); border-radius: 14px; padding: 24px;
        text-align: center; color: var(--muted); cursor: pointer; background: #fff;
      }
      .uploader.has-img { padding: 8px; }
      .uploader img { max-width: 100%; border-radius: 10px; display: block; }
      input[type="file"] { display: none; }
      textarea {
        width: 100%; border: 1px solid var(--line); border-radius: 12px;
        padding: 10px; font: inherit; resize: vertical; min-height: 56px; background: #fff;
      }
      button.primary {
        width: 100%; padding: 14px; border: none; border-radius: 14px;
        background: var(--accent); color: #fff; font-size: 16px; font-weight: 600;
        cursor: pointer;
      }
      button.primary:disabled { opacity: .5; cursor: not-allowed; }
      button.primary.recording { background: #b03a2e; }
      .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

      .temp-wrap { display: flex; align-items: center; gap: 12px; }
      .temp-bar { flex: 1; height: 12px; background: var(--line); border-radius: 6px; overflow: hidden; }
      .temp-fill { height: 100%; border-radius: 6px; transition: width .5s; }
      .temp-num { font-size: 24px; font-weight: 700; min-width: 46px; text-align: right; }

      .badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 14px; font-weight: 600; }
      .badge.go { background: #e2f0e5; color: var(--good); }
      .badge.hold { background: #f6ecd6; color: var(--warn); }
      .badge.slow { background: #f6dcd2; color: var(--hot); }

      h3.section { font-size: 15px; margin: 18px 0 8px; color: var(--accent); }
      .item { border-top: 1px solid var(--line); padding: 10px 0; }
      .item:first-of-type { border-top: none; }
      .item .k { font-weight: 600; }
      .item .v { color: var(--muted); font-size: 14px; }

      .reply {
        background: #fff; border: 1px solid var(--line); border-radius: 12px;
        padding: 12px; margin-bottom: 10px;
      }
      .reply .text { font-size: 15px; }
      .reply .why { color: var(--muted); font-size: 13px; margin-top: 4px; }
      .reply button {
        margin-top: 8px; padding: 6px 14px; border: 1px solid var(--accent);
        background: #fff; color: var(--accent); border-radius: 999px; font-size: 13px; cursor: pointer;
      }
      .avoid li { color: #a3503a; font-size: 14px; }
      .err { color: #b03a2e; font-size: 14px; }
      .spinner { text-align: center; color: var(--muted); padding: 20px; }
      .hidden { display: none; }

      /* 录音模式 */
      .rec-row { display: flex; gap: 10px; align-items: stretch; }
      .rec-row .primary { flex: 2; }
      .me-btn {
        flex: 1; border: 1px solid var(--line); border-radius: 14px; background: #fff;
        font-size: 14px; cursor: pointer; color: var(--muted); user-select: none;
        -webkit-user-select: none; touch-action: manipulation;
      }
      .me-btn.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 600; }
      .transcript {
        max-height: 220px; overflow-y: auto; background: #fff;
        border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
        font-size: 14px;
      }
      .transcript .tl { margin: 4px 0; }
      .transcript .sp { font-weight: 600; color: var(--accent); margin-right: 6px; }
      .transcript .sp.me { color: var(--good); }
      .live-dot {
        display: inline-block; width: 8px; height: 8px; border-radius: 50%;
        background: #b03a2e; margin-right: 6px; animation: blink 1.2s infinite;
      }
      @keyframes blink { 50% { opacity: .2; } }

      /* 历史 */
      .hist-item {
        display: flex; justify-content: space-between; align-items: center;
        border-top: 1px solid var(--line); padding: 10px 2px; cursor: pointer; font-size: 14px;
      }
      .hist-item:first-of-type { border-top: none; }
      .hist-item .meta { color: var(--muted); font-size: 12px; }
      details summary { cursor: pointer; font-weight: 600; font-size: 14px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>读心助手</h1>
        <p>分析对方此刻的心理状态，给出你下一步该怎么说。</p>
      </header>

      <div class="modes" id="modes">
        <div class="mode active" data-mode="shot">📷 截图分析</div>
        <div class="mode" data-mode="audio">🎙️ 实时录音</div>
      </div>

      <div class="card">
        <label>选择场景</label>
        <div class="scenes" id="scenes">
          <div class="scene active" data-scene="dating">情感暧昧</div>
          <div class="scene" data-scene="sales">销售客户</div>
          <div class="scene" data-scene="general">通用</div>
        </div>
      </div>

      <div class="card">
        <label>补充背景（可选）</label>
        <textarea id="note" placeholder="例如：认识两周，第一次约她吃饭被婉拒了 / 这个客户上周说要再考虑考虑"></textarea>
      </div>

      <!-- 截图模式 -->
      <div id="shotPanel">
        <div class="card">
          <label>聊天截图</label>
          <div class="uploader" id="uploader">
            <span id="uploaderHint">点击上传 / 拍摄聊天截图</span>
            <img id="preview" class="hidden" alt="预览" />
          </div>
          <input type="file" id="file" accept="image/*" />
          <div class="hint">右侧气泡识别为「你」，左侧为「对方」。图片只用于本次分析。</div>
        </div>
        <button class="primary" id="analyzeBtn" disabled>开始分析</button>
      </div>

      <!-- 录音模式 -->
      <div id="audioPanel" class="hidden">
        <div class="card">
          <label>实时录音 · 边聊边分析</label>
          <div class="rec-row">
            <button class="primary" id="recBtn">开始录音</button>
            <button class="me-btn hidden" id="meBtn">我在说</button>
          </div>
          <div class="hint">
            录音仅用于当次转写分析，不会保存。请确保已告知对方并获得同意。
            自己说话时点亮「我在说」，能让分析更准。
          </div>
          <div id="recErr" class="err"></div>
        </div>
        <div class="card hidden" id="transcriptCard">
          <label><span class="live-dot" id="liveDot"></span>对话转写</label>
          <div class="transcript" id="transcript"></div>
        </div>
      </div>

      <div class="hint" id="globalErr"></div>
      <div id="result" class="hidden"></div>

      <div class="card" id="histCard">
        <details>
          <summary>历史记录</summary>
          <div id="histList" style="margin-top:8px"></div>
        </details>
      </div>
    </div>

    <script>
      const state = {
        scene: "dating", mode: "shot", image: null,
        ws: null, stream: null, recorder: null, segTimer: null,
        recording: false, meSpeaking: false, lastAudioAnalysis: null,
      };
      const $ = (id) => document.getElementById(id);

      // —— 模式与场景切换 ——
      $("modes").addEventListener("click", (e) => {
        const el = e.target.closest(".mode");
        if (!el || state.recording) return;
        document.querySelectorAll(".mode").forEach((s) => s.classList.remove("active"));
        el.classList.add("active");
        state.mode = el.dataset.mode;
        $("shotPanel").classList.toggle("hidden", state.mode !== "shot");
        $("audioPanel").classList.toggle("hidden", state.mode !== "audio");
      });
      $("scenes").addEventListener("click", (e) => {
        const el = e.target.closest(".scene");
        if (!el) return;
        document.querySelectorAll(".scene").forEach((s) => s.classList.remove("active"));
        el.classList.add("active");
        state.scene = el.dataset.scene;
      });

      // —— 截图模式 ——
      $("uploader").addEventListener("click", () => $("file").click());
      $("file").addEventListener("change", (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = () => setImage(reader.result);
        reader.readAsDataURL(f);
      });

      function setImage(dataUrl) {
        state.image = dataUrl;
        $("preview").src = dataUrl;
        $("preview").classList.remove("hidden");
        $("uploaderHint").classList.add("hidden");
        $("uploader").classList.add("has-img");
        $("analyzeBtn").disabled = false;
      }

      // 桌面端（Tauri）热键捕获微信窗口后，通过 eval 调用这里直接注入并分析
      window.receiveCapture = (dataUrl) => {
        if (state.mode !== "shot") $("modes").querySelector('[data-mode="shot"]').click();
        setImage(dataUrl);
        analyze();
      };

      $("analyzeBtn").addEventListener("click", analyze);

      async function analyze() {
        if (!state.image) return;
        $("globalErr").textContent = "";
        $("analyzeBtn").disabled = true;
        $("result").classList.remove("hidden");
        $("result").innerHTML = '<div class="spinner">正在读心中…（约 10-20 秒）</div>';

        try {
          const r = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: state.image, scene: state.scene, note: $("note").value }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || "分析失败");
          render(data.analysis);
          saveHistory(data.analysis);
        } catch (err) {
          $("result").classList.add("hidden");
          $("globalErr").innerHTML = '<span class="err">' + esc(err.message) + "</span>";
        } finally {
          $("analyzeBtn").disabled = false;
        }
      }

      // —— 录音模式 ——
      $("recBtn").addEventListener("click", () => (state.recording ? stopRec() : startRec()));
      $("meBtn").addEventListener("click", () => {
        state.meSpeaking = !state.meSpeaking;
        $("meBtn").classList.toggle("on", state.meSpeaking);
      });

      function pickMime() {
        if (typeof MediaRecorder === "undefined") return null;
        for (const m of ["audio/webm;codecs=opus", "audio/webm", "audio/mp4"]) {
          if (MediaRecorder.isTypeSupported(m)) return m;
        }
        return "";
      }

      async function startRec() {
        $("recErr").textContent = "";
        const mime = pickMime();
        if (mime === null) return ($("recErr").textContent = "此浏览器不支持录音。iPhone 请用 Safari 并通过 HTTPS 访问。");
        try {
          state.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch {
          return ($("recErr").textContent = "无法获取麦克风权限。请在浏览器设置中允许，并使用 HTTPS/localhost 访问。");
        }
        const proto = location.protocol === "https:" ? "wss://" : "ws://";
        const ws = new WebSocket(proto + location.host + "/api/audio");
        state.ws = ws;
        ws.onopen = () => {
          ws.send(JSON.stringify({ type: "config", scene: state.scene, note: $("note").value }));
          state.recording = true;
          state.lastAudioAnalysis = null;
          $("recBtn").textContent = "停止录音";
          $("recBtn").classList.add("recording");
          $("meBtn").classList.remove("hidden");
          $("transcriptCard").classList.remove("hidden");
          $("transcript").innerHTML = "";
          $("result").classList.remove("hidden");
          $("result").innerHTML = '<div class="spinner">正在聆听…累积一段对话后自动分析</div>';
          loopSegment(mime);
        };
        ws.onmessage = (e) => handleWs(JSON.parse(e.data));
        ws.onerror = () => ($("recErr").textContent = "连接出错，请刷新重试。");
        ws.onclose = () => { if (state.recording) stopRec(true); };
      }

      // 每段重启 MediaRecorder，保证每个 blob 都是可独立解码的完整音频
      function loopSegment(mime) {
        if (!state.recording || !state.stream) return;
        const rec = new MediaRecorder(state.stream, mime ? { mimeType: mime } : {});
        const speaker = state.meSpeaking ? "me" : "other";
        rec.ondataavailable = (ev) => {
          if (ev.data && ev.data.size > 1000 && state.ws?.readyState === 1) {
            const reader = new FileReader();
            reader.onload = () => {
              const b64 = reader.result.split(",")[1];
              state.ws.send(JSON.stringify({ type: "audio", chunk: b64, mime: ev.data.type || mime, speaker }));
            };
            reader.readAsDataURL(ev.data);
          }
        };
        rec.onstop = () => loopSegment(mime);
        rec.start();
        state.recorder = rec;
        state.segTimer = setTimeout(() => { if (rec.state !== "inactive") rec.stop(); }, 5000);
      }

      function stopRec(fromClose = false) {
        state.recording = false;
        clearTimeout(state.segTimer);
        try { state.recorder?.state !== "inactive" && state.recorder?.stop(); } catch {}
        state.stream?.getTracks().forEach((t) => t.stop());
        state.stream = null;
        if (!fromClose && state.ws?.readyState === 1) state.ws.send(JSON.stringify({ type: "end" }));
        $("recBtn").textContent = "开始录音";
        $("recBtn").classList.remove("recording");
        $("meBtn").classList.add("hidden");
        $("liveDot").style.display = "none";
        if (state.lastAudioAnalysis) saveHistory(state.lastAudioAnalysis);
      }

      function handleWs(msg) {
        if (msg.type === "transcript") {
          const sp = msg.speaker === "me" ? "我" : msg.speaker === "other" ? "对方" : "…";
          const div = document.createElement("div");
          div.className = "tl";
          div.innerHTML = `<span class="sp ${msg.speaker === "me" ? "me" : ""}">${sp}</span>${esc(msg.text)}`;
          $("transcript").appendChild(div);
          $("transcript").scrollTop = $("transcript").scrollHeight;
        } else if (msg.type === "analysis") {
          state.lastAudioAnalysis = msg.data;
          render(msg.data);
        } else if (msg.type === "error") {
          $("recErr").textContent = msg.msg;
        }
      }

      // —— 渲染 ——
      function tempColor(t) {
        if (t >= 66) return "var(--hot)";
        if (t >= 33) return "var(--warn)";
        return "#6b8cae";
      }
      function pushClass(p) {
        if (p === "可以推进") return "go";
        if (p === "保持节奏") return "hold";
        return "slow";
      }
      function esc(s) {
        return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
      }

      function render(a) {
        const signals = a.signals.map((s) =>
          `<div class="item"><div class="k">${esc(s.signal)}</div><div class="v">${esc(s.meaning)}</div></div>`
        ).join("");
        const replies = a.replies.map((rp, i) =>
          `<div class="reply">
             <div class="text">${esc(rp.text)}</div>
             <div class="why">${esc(rp.why)}</div>
             <button onclick="copyReply(${i})" data-text="${esc(rp.text)}">复制</button>
           </div>`
        ).join("");
        const avoid = a.avoid.map((x) => `<li>${esc(x)}</li>`).join("");

        $("result").classList.remove("hidden");
        $("result").innerHTML = `
          <div class="card">
            <label>对方意向热度</label>
            <div class="temp-wrap">
              <div class="temp-bar"><div class="temp-fill" style="width:${a.temperature}%;background:${tempColor(a.temperature)}"></div></div>
              <div class="temp-num" style="color:${tempColor(a.temperature)}">${a.temperature}</div>
            </div>
            <div class="v" style="color:var(--muted);font-size:13px;margin-top:6px">${esc(a.temperature_reason)}</div>
          </div>

          <div class="card">
            <h3 class="section">对方此刻的心理</h3>
            <div>${esc(a.counterpart_state)}</div>
            <h3 class="section">关键信号</h3>
            ${signals}
          </div>

          <div class="card">
            <h3 class="section">现在能不能推进？</h3>
            <span class="badge ${pushClass(a.can_push)}">${esc(a.can_push)}</span>
            <div class="v" style="margin-top:8px">${esc(a.push_reason)}</div>
          </div>

          <div class="card">
            <h3 class="section">建议这样回</h3>
            ${replies}
            <h3 class="section">尽量避免</h3>
            <ul class="avoid">${avoid}</ul>
          </div>
        `;
      }

      function copyReply(i) {
        const btn = document.querySelectorAll(".reply button")[i];
        navigator.clipboard.writeText(btn.dataset.text).then(() => {
          btn.textContent = "已复制 ✓";
          setTimeout(() => (btn.textContent = "复制"), 1500);
        });
      }

      // —— 历史记录（仅存本机 localStorage）——
      const HIST_KEY = "mypua_history";
      const SCENE_LABEL = { dating: "情感", sales: "销售", general: "通用" };
      function loadHistory() {
        try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch { return []; }
      }
      function saveHistory(analysis) {
        const list = loadHistory();
        list.unshift({ t: Date.now(), scene: state.scene, mode: state.mode, analysis });
        localStorage.setItem(HIST_KEY, JSON.stringify(list.slice(0, 20)));
        renderHistory();
      }
      function renderHistory() {
        const list = loadHistory();
        $("histList").innerHTML = list.length
          ? list.map((h, i) => {
              const d = new Date(h.t);
              const time = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
              return `<div class="hist-item" onclick="openHistory(${i})">
                <span>${h.mode === "audio" ? "🎙️" : "📷"} ${SCENE_LABEL[h.scene] || "通用"} · 热度 ${h.analysis.temperature} · ${esc(h.analysis.can_push)}</span>
                <span class="meta">${time}</span>
              </div>`;
            }).join("")
          : '<div class="hint">还没有分析记录。</div>';
      }
      function openHistory(i) {
        const h = loadHistory()[i];
        if (h) { render(h.analysis); $("result").scrollIntoView({ behavior: "smooth" }); }
      }
      renderHistory();

      // —— PWA ——
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
    </script>
  </body>
</html>
